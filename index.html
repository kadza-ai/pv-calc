<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PV Solar Panel Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>PV Solar Panel Calculator</h1>
  <div class="layout">
    <div class="inputs">
      <div class="module" id="location-inputs">
        <h2>Location</h2>
        <label for="latitude">Latitude (&deg;)</label>
        <input type="number" id="latitude" value="51.66" step="0.01" min="0" max="65">
      </div>
      <div class="module" id="terrain-inputs">
        <h2>Terrain</h2>
        <label for="terrain-width">Width (m)</label>
        <input type="number" id="terrain-width" value="12" step="0.1" min="0">
        <label for="terrain-height">Height (m)</label>
        <input type="number" id="terrain-height" value="5" step="0.1" min="0">
        <label for="panel-width">Panel width (m)</label>
        <input type="number" id="panel-width" value="1.1" step="0.01" min="0.1">
        <label for="panel-height">Panel height (m)</label>
        <input type="number" id="panel-height" value="1.7" step="0.01" min="0.1">
        <h3>Override grid</h3>
        <label for="override-cols">Columns (blank = auto)</label>
        <input type="number" id="override-cols" step="1" min="0" placeholder="auto">
        <label for="override-rows">Rows (blank = auto)</label>
        <input type="number" id="override-rows" step="1" min="0" placeholder="auto">
      </div>
    </div>
    <div class="results">
      <div class="module" id="location-results">
        <h2>Peak Sun Hours (monthly)</h2>
        <div id="psh-output"></div>
      </div>
      <div class="module" id="terrain-results">
        <h2>Panel Layout</h2>
        <div id="terrain-output"></div>
      </div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
