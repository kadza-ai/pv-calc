<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PV Solar Panel Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>PV Solar Panel Calculator</h1>
  <div class="layout">
    <div class="inputs">
      <div class="module" id="location-inputs">
        <h2>Location</h2>
        <label for="latitude">Latitude (&deg;)</label>
        <input type="number" id="latitude" value="51.66" step="0.01" min="0" max="65">
      </div>
      <div class="module" id="terrain-inputs">
        <h2>Terrain</h2>
        <label for="terrain-width">Width (m)</label>
        <input type="number" id="terrain-width" value="12" step="0.1" min="0">
        <label for="terrain-height">Height (m)</label>
        <input type="number" id="terrain-height" value="5" step="0.1" min="0">
        <label for="panel-width">Panel width (m)</label>
        <input type="number" id="panel-width" value="1.1" step="0.01" min="0.1">
        <label for="panel-height">Panel height (m)</label>
        <input type="number" id="panel-height" value="1.7" step="0.01" min="0.1">
        <h3>Override grid</h3>
        <label for="override-cols">Columns (blank = auto)</label>
        <input type="number" id="override-cols" step="1" min="0" placeholder="auto">
        <label for="override-rows">Rows (blank = auto)</label>
        <input type="number" id="override-rows" step="1" min="0" placeholder="auto">
      </div>
      <div class="module" id="panels-inputs">
        <h2>Panels</h2>
        <label for="panel-wp">Panel Wp</label>
        <input type="number" id="panel-wp" value="400" step="10" min="1">
        <label for="panel-voc">Panel Voc (V)</label>
        <input type="number" id="panel-voc" value="37.5" step="0.1" min="1">
        <label for="max-voltage">Max inverter voltage (V DC)</label>
        <input type="number" id="max-voltage" value="800" step="10" min="100">
        <label for="tilt-angle">Tilt angle (&deg;, blank = auto from latitude)</label>
        <input type="number" id="tilt-angle" step="0.1" min="0" max="90" placeholder="auto">
        <label for="azimuth">Azimuth (&deg;, 180 = due south)</label>
        <input type="number" id="azimuth" value="180" step="1" min="0" max="360">
        <label for="dc-ac-ratio">DC/AC ratio</label>
        <input type="number" id="dc-ac-ratio" value="1.0" step="0.1" min="0.1">
      </div>
      <div class="module" id="consumption-inputs">
        <h2>Consumption &amp; Price</h2>
        <label for="electricity-price">Electricity price (PLN/kWh)</label>
        <input type="number" id="electricity-price" value="0.75" step="0.01" min="0">
        <label for="loss-factor">System loss factor</label>
        <input type="number" id="loss-factor" value="0.85" step="0.01" min="0" max="1">
        <div id="monthly-consumption-inputs"></div>
      </div>
      <div class="module" id="cable-inputs">
        <h2>Cable</h2>
        <label for="cable-length">Distance to inverter (m)</label>
        <input type="number" id="cable-length" value="30" step="1" min="1">
        <label for="max-drop-pct">Max voltage drop (%)</label>
        <input type="number" id="max-drop-pct" value="2" step="0.1" min="0.1">
        <label for="cable-size">Cable size (mm&sup2;, blank = auto)</label>
        <input type="number" id="cable-size" step="1" min="1" placeholder="auto">
      </div>
    </div>
    <div class="results">
      <div class="module" id="location-results">
        <h2>Peak Sun Hours (monthly)</h2>
        <div id="psh-output"></div>
      </div>
      <div class="module" id="terrain-results">
        <h2>Panel Layout</h2>
        <div id="terrain-output"></div>
      </div>
      <div class="module" id="panels-results">
        <h2>String Configuration</h2>
        <div id="panels-output"></div>
      </div>
      <div class="module" id="cable-results">
        <h2>Cable Sizing</h2>
        <div id="cable-output"></div>
      </div>
      <div class="module" id="consumption-results">
        <h2>Production &amp; Savings</h2>
        <div id="consumption-output"></div>
        <canvas id="production-chart" width="500" height="250"></canvas>
      </div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
